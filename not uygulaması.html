<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Task Manager - Advanced</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme Variables */
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --border: #e2e8f0;
            --input-bg: #ffffff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            /* Dark Theme Variables */
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #818cf8;
            --accent-hover: #6366f1;
            --border: #334155;
            --input-bg: #1e293b;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        /* App Card */
        .card {
            background: var(--bg-card);
            border-radius: 1.5rem;
            box-shadow: var(--shadow);
            padding: 2.5rem;
            border: 1px solid var(--border);
        }

        /* Header & Stats */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .stats {
            display: flex;
            gap: 1rem;
            background: var(--bg-body);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .stats-item span {
            color: var(--accent);
            font-weight: 700;
        }

        /* Controls: Theme & Search */
        .controls {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .search-container {
            flex: 1;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text-main);
            outline: none;
        }

        .search-container svg {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .icon-btn {
            background: var(--bg-body);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 0.75rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .icon-btn:hover {
            transform: translateY(-2px);
            background: var(--border);
        }

        /* Input Section */
        .input-section {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .input-main {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .task-input-wrapper {
            display: flex;
            gap: 0.5rem;
        }

        input[type="text"].main-input {
            flex: 1;
            padding: 0.8rem 1.25rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
        }

        input[type="text"].main-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .meta-selects {
            display: flex;
            gap: 0.5rem;
        }

        select {
            padding: 0.5rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 0.8rem;
            cursor: pointer;
            outline: none;
        }

        .btn-add {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            height: 100%;
        }

        .btn-add:hover {
            background: var(--accent-hover);
        }

        /* Filters & Bulk Actions */
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .filters {
            display: flex;
            gap: 0.5rem;
        }

        .filter-btn {
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
        }

        .filter-btn.active {
            background: var(--accent);
            color: white;
        }

        .btn-clear {
            font-size: 0.8rem;
            color: var(--danger);
            background: transparent;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-clear:hover {
            text-decoration: underline;
        }

        /* List Items */
        ul {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        ul::-webkit-scrollbar {
            width: 4px;
        }

        ul::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        li {
            display: flex;
            align-items: center;
            padding: 1rem;
            background: var(--bg-body);
            border-radius: 1rem;
            margin-bottom: 0.75rem;
            animation: slideIn 0.3s ease-out;
            border: 1px solid transparent;
        }

        li:hover {
            border-color: var(--accent);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .checkbox-container {
            margin-right: 1rem;
            display: flex;
        }

        input[type="checkbox"] {
            width: 1.25rem;
            height: 1.25rem;
            accent-color: var(--success);
            cursor: pointer;
        }

        .task-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .task-title {
            font-size: 0.95rem;
            font-weight: 500;
            word-break: break-all;
        }

        .completed .task-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .task-tags {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .tag {
            font-size: 0.7rem;
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            text-transform: uppercase;
            font-weight: 700;
        }

        .tag-category { background: rgba(99, 102, 241, 0.1); color: var(--accent); }
        
        .prio-high { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .prio-medium { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .prio-low { background: rgba(16, 185, 129, 0.1); color: var(--success); }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.4rem;
            border-radius: 0.4rem;
        }

        .action-btn:hover {
            background: rgba(0,0,0,0.05);
            color: var(--text-main);
        }

        .action-btn.del:hover {
            color: var(--danger);
            background: #fee2e2;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 0;
            color: var(--text-muted);
        }

        .empty-state svg {
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .input-section {
                grid-template-columns: 1fr;
            }
            .btn-add {
                padding: 0.8rem;
            }
            .stats {
                display: none;
            }
        }
    </style>
</head>
<body data-theme="light">

    <div class="container">
        <div class="card">
            <header>
                <h1>My Task Manager</h1>
                <div class="stats">
                    <div class="stats-item">Yapılacak: <span id="pending-count">0</span></div>
                    <div class="stats-item">Biten: <span id="completed-count">0</span></div>
                </div>
            </header>

            <div class="controls">
                <div class="search-container">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="searchInput" placeholder="Görevlerde ara...">
                </div>
                <button class="icon-btn" id="themeToggle" title="Temayı Değiştir">
                    <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>

            <div class="input-section">
                <div class="input-main">
                    <div class="task-input-wrapper">
                        <input type="text" id="taskInput" class="main-input" placeholder="Yeni görev yazın..." maxlength="60">
                    </div>
                    <div class="meta-selects">
                        <select id="categorySelect">
                            <option value="Genel">📁 Genel</option>
                            <option value="İş">💼 İş</option>
                            <option value="Kişisel">🏠 Kişisel</option>
                            <option value="Alışveriş">🛒 Alışveriş</option>
                        </select>
                        <select id="prioritySelect">
                            <option value="low">🟢 Düşük Prio</option>
                            <option value="medium">🟡 Orta Prio</option>
                            <option value="high">🔴 Yüksek Prio</option>
                        </select>
                    </div>
                </div>
                <button class="btn-add" id="addBtn">Ekle</button>
            </div>

            <div class="filter-bar">
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">Hepsi</button>
                    <button class="filter-btn" data-filter="pending">Bekleyen</button>
                    <button class="filter-btn" data-filter="completed">Tamamlanan</button>
                </div>
                <button class="btn-clear" id="clearCompleted">Bitmişleri Temizle</button>
            </div>

            <ul id="taskList">
                <!-- Tasks will appear here -->
            </ul>

            <div id="emptyState" class="empty-state" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="9" y1="15" x2="15" y2="15"></line><line x1="9" y1="11" x2="15" y2="11"></line><line x1="9" y1="19" x2="15" y2="19"></line></svg>
                <p>Henüz bir görev yok.</p>
            </div>
        </div>
    </div>

    <script>
        // --- Durum Yönetimi (State) ---
        let tasks = JSON.parse(localStorage.getItem('tasks_v2')) || [];
        let currentFilter = 'all';
        let searchQuery = '';
        let isDarkMode = localStorage.getItem('theme') === 'dark';

        // --- DOM Elementleri ---
        const taskInput = document.getElementById('taskInput');
        const categorySelect = document.getElementById('categorySelect');
        const prioritySelect = document.getElementById('prioritySelect');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const searchInput = document.getElementById('searchInput');
        const pendingCount = document.getElementById('pending-count');
        const completedCount = document.getElementById('completed-count');
        const clearCompletedBtn = document.getElementById('clearCompleted');
        const emptyState = document.getElementById('emptyState');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // --- Başlatma ---
        function init() {
            setTheme(isDarkMode);
            render();
        }

        // --- İş Mantığı ---

        function addTask() {
            const text = taskInput.value.trim();
            if (!text) return;

            const newTask = {
                id: Date.now(),
                text: text,
                completed: false,
                category: categorySelect.value,
                priority: prioritySelect.value,
                createdAt: new Date().toISOString()
            };

            tasks.unshift(newTask);
            taskInput.value = '';
            saveAndRender();
        }

        window.toggleTask = function(id) {
            tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
            saveAndRender();
        };

        window.deleteTask = function(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRender();
        };

        window.editTask = function(id) {
            const task = tasks.find(t => t.id === id);
            const newText = prompt("Görevi düzenle:", task.text);
            if (newText !== null && newText.trim() !== "") {
                tasks = tasks.map(t => t.id === id ? { ...t, text: newText.trim() } : t);
                saveAndRender();
            }
        };

        function clearCompleted() {
            tasks = tasks.filter(t => !t.completed);
            saveAndRender();
        }

        function setTheme(dark) {
            isDarkMode = dark;
            document.body.setAttribute('data-theme', dark ? 'dark' : 'light');
            themeIcon.innerHTML = dark 
                ? '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>'
                : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
            localStorage.setItem('theme', dark ? 'dark' : 'light');
        }

        function saveAndRender() {
            localStorage.setItem('tasks_v2', JSON.stringify(tasks));
            render();
        }

        function render() {
            // Filtreleme
            let filteredTasks = tasks.filter(task => {
                const matchesFilter = 
                    currentFilter === 'all' ? true :
                    currentFilter === 'pending' ? !task.completed :
                    task.completed;
                
                const matchesSearch = task.text.toLowerCase().includes(searchQuery.toLowerCase());
                
                return matchesFilter && matchesSearch;
            });

            // Listeyi Temizle
            taskList.innerHTML = '';

            // Boş Durum Kontrolü
            if (filteredTasks.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                filteredTasks.forEach(task => {
                    const li = document.createElement('li');
                    if (task.completed) li.classList.add('completed');

                    li.innerHTML = `
                        <div class="checkbox-container">
                            <input type="checkbox" ${task.completed ? 'checked' : ''} onclick="toggleTask(${task.id})">
                        </div>
                        <div class="task-content">
                            <span class="task-title">${task.text}</span>
                            <div class="task-tags">
                                <span class="tag tag-category">${task.category}</span>
                                <span class="tag prio-${task.priority}">${task.priority === 'high' ? 'Yüksek' : task.priority === 'medium' ? 'Orta' : 'Düşük'}</span>
                            </div>
                        </div>
                        <div class="actions">
                            <button class="action-btn" onclick="editTask(${task.id})" title="Düzenle">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <button class="action-btn del" onclick="deleteTask(${task.id})" title="Sil">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </div>
                    `;
                    taskList.appendChild(li);
                });
            }

            // İstatistikleri Güncelle
            pendingCount.innerText = tasks.filter(t => !t.completed).length;
            completedCount.innerText = tasks.filter(t => t.completed).length;
        }

        // --- Olay Dinleyicileri (Events) ---

        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addTask(); });

        themeToggle.addEventListener('click', () => setTheme(!isDarkMode));

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            render();
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                render();
            });
        });

        clearCompletedBtn.addEventListener('click', clearCompleted);

        // Başlat
        init();
    </script>
</body>
</html>
