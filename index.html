<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Deneyim Laboratuvarı</title>
    <style>
        /* Arka plan ve genel stil */
        body {
            margin: 0;
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Profil Fotoğrafı */
        .profile-pic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid #ff007f;
            box-shadow: 0 0 20px #ff007f;
            object-fit: cover;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            color: #ff007f;
            text-shadow: 0 0 10px #ff007f;
            margin-bottom: 30px;
        }

        /* Buton Grubu */
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 250px;
        }

        /* Parlayan ve Renk Geçişli Butonlar */
        .btn {
            text-decoration: none;
            color: white;
            padding: 12px;
            text-align: center;
            border: 2px solid #ff007f;
            border-radius: 10px;
            font-weight: bold;
            background: linear-gradient(45deg, #1a1a1a, #2a2a2a);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        /* Hareket ve Parlama Efekti */
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #ff007f;
            background: #ff007f;
            color: #000;
        }

        /* Işık Süzmesi (Parlayarak geçiş) */
        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 20%;
            height: 200%;
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(30deg);
            transition: 0.5s;
        }

        .btn:hover::after {
            left: 120%;
        }
    </style>
</head>
<body>

    <img src="resim.jpeg" alt="Profil" class="profile-pic">

    <h1>Dijital Deneyim Laboratuvarı</h1>

    <div class="links">
        <a href="veri.csv" class="btn" target="_blank">VERİ SETİ (CSV)</a>
        <a href="grafik.png" class="btn" target="_blank">GRAFİKLERİ GÖR</a>
        <a href="not.html" class="btn">UYGULAMAYA GİT</a>
    </div>

</body>
</html>
