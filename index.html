<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Portfolyom</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        overflow: hidden;

        /* ANİMASYONLU PEMBE-MOR ARKA PLAN */
        background: linear-gradient(-45deg, #ff4d88, #a64dff, #ff99cc, #cc66ff);
        background-size: 400% 400%;
        animation: gradientBG 10s ease infinite;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* MOUSE IŞIK EFEKTİ */
    .light {
        position: fixed;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        pointer-events: none;
        background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
        transform: translate(-50%, -50%);
        mix-blend-mode: screen;
    }

    .container {
        position: relative;
        z-index: 2;
        text-align: center;
        color: white;
        top: 50%;
        transform: translateY(-50%);
    }

    img {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        border: 4px solid white;
        margin-bottom: 20px;
        box-shadow: 0 0 25px rgba(255,255,255,0.7);
    }

    h1 {
        margin-bottom: 30px;
        text-shadow: 0 0 10px white;
    }

    .btn {
        display: block;
        margin: 15px auto;
        padding: 14px 30px;
        width: 240px;
        text-decoration: none;
        color: white;
        background: rgba(255,255,255,0.15);
        border-radius: 30px;
        backdrop-filter: blur(10px);
        transition: 0.3s;
        font-weight: bold;
        box-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    .btn:hover {
        background: white;
        color: #ff4d88;
        transform: scale(1.1);
        box-shadow: 0 0 25px white;
    }

</style>
</head>

<body>

<!-- MOUSE IŞIK -->
<div class="light" id="light"></div>

<div class="container">

    <!-- PROFİL FOTO -->
    <img src="image.png.jpeg">

    <h1>Rüveyda'nın Portfolyosu</h1>

    <a class="btn" href="data.csv" target="_blank">CSV Dosyam</a>
    <a class="btn" href="not uygulaması.html" target="_blank">Uygulamam</a>
    <a class="btn" href="visual_analysis.png" target="_blank">Grafiklerim</a>

</div>

<script>
    const light = document.getElementById("light");

    document.addEventListener("mousemove", (e) => {
        light.style.left = e.clientX + "px";
        light.style.top = e.clientY + "px";
    });
</script>

</body>
</html>
