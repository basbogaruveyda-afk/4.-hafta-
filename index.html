<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Experience Lab</title>
    <style>
        :root {
            --primary-pink: #ff007f;
            --dark-bg: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Fare Takip Efekti İçin Canvas */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            z-index: 1;
            text-align: center;
            backdrop-filter: blur(10px);
            background: var(--glass-bg);
            padding: 3rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 0, 127, 0.3);
            box-shadow: 0 0 50px rgba(255, 0, 127, 0.1);
        }

        /* Profil Fotoğrafı (Yuvarlak ve Neon) */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--primary-pink);
            box-shadow: 0 0 20px var(--primary-pink);
            object-fit: cover;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.1) rotate(5deg);
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--primary-pink);
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            color: white;
            padding: 12px 30px;
            border: 2px solid var(--primary-pink);
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            background: transparent;
        }

        .btn:hover {
            background: var(--primary-pink);
            box-shadow: 0 0 30px var(--primary-pink);
            color: #000;
        }

        /* Özel Renk Butonu */
        .btn-special {
            background: linear-gradient(45deg, #ff007f, #8e44ad);
            border: none;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="container">
        <img src="resim.png.jpeg" alt="Profil" class="profile-img">
        
        <h1>Digital Experience Lab</h1>

        <div class="button-group">
            <a href="renk.html" class="btn btn-special">Renk Dünyası</a>
            <a href="../3.-hafta/grafikler.png" class="btn">Grafik</a>
            <a href="../3.-hafta/data.csv" class="btn">Data</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 5 + 1;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
                this.color = '#ff007f';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.1;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        window.addEventListener('mousemove', function(e) {
            for (let i = 0; i < 3; i++) {
                particles.push(new Particle(e.x, e.y));
            }
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].size <= 0.2) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
