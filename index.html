<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Rüveyda Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 50px;
        }

        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            transition: transform 0.3s ease;
        }

        img:hover {
            transform: scale(1.1);
        }

        h1 {
            margin-top: 15px;
        }

        .links {
            margin-top: 30px;
        }

        .btn {
            display: block;
            width: 250px;
            margin: 15px auto;
            padding: 12px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            background: linear-gradient(45deg, #ff6a00, #ee0979);
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
            background: linear-gradient(45deg, #43cea2, #185a9d);
        }
    </style>
</head>
<body>

        </a>

        <!-- GRAFİK -->

            📈 Grafiklerim
        </a>

    </div>

</div>

</html>
