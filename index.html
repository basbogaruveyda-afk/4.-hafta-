<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Deneyim Laboratuvarı</title>
    <style>
        /* Genel Arka Plan ve Renk Geçişi */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Profil Fotoğrafı Alanı */
        .profile-container {
            margin-top: 20px;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #ff00ff;
            box-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .profile-img:hover {
            transform: scale(1.1);
        }

        h1 {
            margin-top: 15px;
            text-shadow: 0 0 10px #ff00ff;
            font-size: 2.5rem;
        }

        /* Buton Konteynırı */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
            width: 80%;
            max-width: 400px;
        }

        /* Parlayan ve Renk Geçişli Butonlar */
        .nav-button {
            text-decoration: none;
            color: white;
            padding: 15px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            border: 2px solid #ff00ff;
            border-radius: 50px;
            background: rgba(255, 0, 255, 0.1);
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        /* Buton Üzerine Gelince Parlama Efekti */
        .nav-button:hover {
            background: #ff00ff;
            color: #000;
            box-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff;
            transform: translateY(-5px);
        }

        /* Hareketli "Parla" Efekti (Işık Süzmesi) */
        .nav-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: all 0.5s;
        }

        .nav-button:hover::before {
            left: 100%;
        }

        /* Alt Bilgi */
        footer {
            margin-top: 50px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="resim.jpeg" alt="Profil Fotoğrafı" class="profile-img">
    </div>

    <h1>Dijital Deneyim Laboratuvarı</h1>

    <div class="button-container">
        <a href="veri.csv" class="nav-button" target="_blank">Veri Setini İncele</a>

        <a href="grafik.png" class="nav-button" target="_blank">Grafikleri Görüntüle</a>

        <a href="#" class="nav-button">Uygulamaya Git</a>
    </div>

    <footer>
        &copy; 2026 Portfolyo Projesi
    </footer>

</body>
</html>
