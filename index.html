<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Portfolyom</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            text-align: center;
        }

        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid white;
            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            margin: 10px auto;
            padding: 12px 25px;
            width: 220px;
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.2);
            border-radius: 25px;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn:hover {
            background: white;
            color: #ff4d88;
            transform: scale(1.1);
            box-shadow: 0 0 15px white;
        }

        /* Parlama animasyonu */
        .btn::after {
            content: "";
            display: block;
            width: 0%;
            height: 2px;
            background: white;
            transition: 0.4s;
            margin: auto;
        }

        .btn:hover::after {
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- PROFİL FOTOĞRAFI -->
    <img src="image.png.jpeg" alt="Profil Fotoğrafı">

    <h1>Rüveyda'nın Portfolyosu</h1>

    <!-- CSV DOSYASI -->
    <a class="btn" href="data.csv" target="_blank">CSV Dosyam</a>

    <!-- UYGULAMA -->
    <a class="btn" href="not uygulaması.html" target="_blank">Uygulamam</a>

    <!-- GRAFİK -->
    <a class="btn" href="visual_analysis.png" target="_blank">Grafiklerim</a>

</div>

</body>
</html>
