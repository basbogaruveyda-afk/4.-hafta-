<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Deneyim Laboratuvarı</title>
    <style>
        /* Arka plan: Koyu ve modern */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #1a1a2e 0%, #0f0c29 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        /* Profil resmi çerçevesi ve parlama */
        .profile-box {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #ff00ff;
            box-shadow: 0 0 20px #ff00ff, inset 0 0 10px #ff00ff;
            margin-bottom: 20px;
            overflow: hidden;
            background: #222;
        }

        .profile-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
            margin: 10px 0 40px 0;
        }

        /* Buton Konteynırı */
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 280px;
        }

        /* Hareketli ve Renkli Butonlar */
        .btn {
            position: relative;
            padding: 15px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            border: 2px solid #ff00ff;
            border-radius: 30px;
            background: rgba(255, 0, 255, 0.05);
            transition: 0.4s all;
            overflow: hidden;
            display: block;
        }

        /* Parlama ve Hareket Efekti */
        .btn:hover {
            background: #ff00ff;
            color: #000;
            box-shadow: 0 0 30px #ff00ff;
            transform: translateY(-3px);
        }

        /* Butonun içinden geçen ışık süzmesi */
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #ff00ff;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="profile-box">
        <img src="resim.jpeg" alt="Profil">
    </div>

    <h1>Dijital Deneyim Laboratuvarı</h1>

    <div class="nav-links">
        <a href="veri.csv" class="btn">VERİ SETİ (CSV)</a>
        <a href="grafik.png" class="btn">GRAFİKLER</a>
        <a href="not.html" class="btn">UYGULAMAYA GİT</a>
    </div>

    <footer>&copy; 2026 | Tasarım Laboratuvarı</footer>

</body>
</html>
