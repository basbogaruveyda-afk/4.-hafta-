<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Rüveyda Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(-45deg, #667eea, #764ba2, #ff6a00, #ee0979);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: white;
            text-align: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            margin-top: 50px;
        }

        img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            transition: 0.4s;
        }

        img:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 25px white;
        }

        h1 {
            margin-top: 15px;
        }

        .btn {
            display: block;
            width: 260px;
            margin: 15px auto;
            padding: 14px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 12px;
            background: linear-gradient(45deg, #ff6a00, #ee0979);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.3);
            transition: 0.4s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: scale(1.07);
            box-shadow: 0 0 20px white;
            background: linear-gradient(45deg, #43cea2, #185a9d);
        }
    </style>
</head>

<body>

<div class="container">

    <!-- PROFİL FOTO -->
    <img src="./profile.jpg" alt="Profil">

    <h1>Rüveyda Başboğa</h1>
    <p>Veri Bilimi Öğrencisi</p>

    <!-- LİNKLER -->
    <a class="btn" href="./veri.csv" target="_blank">📊 CSV Dosyam</a>
    <a class="btn" href="./not_uygulamam.html" target="_blank">💻 Uygulamam</a>
    <a class="btn" href="./grafik.png" target="_blank">📈 Grafiklerim</a>

</div>

</body>
</html>
