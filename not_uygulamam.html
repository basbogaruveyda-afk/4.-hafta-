<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Uygulamam | Modern Tasarım</title>
    <!-- Google Fonts: Outfit & Dancing Script for flair -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff7eb3;
            --primary-purple: #8e44ad;
            --pastel-pink: #ffd1dc;
            --pastel-purple: #e1bee7;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glow: 0 0 20px rgba(255, 126, 179, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 30%, #ffd1ff 60%, #a18cd1 100%);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            color: #2d3436;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Fade-in Animation */
        .container {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1.2s forwards ease-out;
            text-align: center;
            z-index: 10;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Profile Section */
        .profile-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 1.5rem;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--white);
            box-shadow: var(--glow);
            transition: transform 0.5s ease;
        }

        .profile-container::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary-pink), var(--primary-purple));
            z-index: -1;
            opacity: 0.4;
            filter: blur(15px);
            animation: rotateGlow 4s linear infinite;
        }

        @keyframes rotateGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .profile-container:hover .profile-pic {
            transform: scale(1.05);
        }

        /* Title */
        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .subtitle {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: var(--primary-purple);
            margin-bottom: 2.5rem;
        }

        /* Buttons */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .btn {
            position: relative;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--white);
            background: linear-gradient(45deg, var(--primary-pink), var(--primary-purple));
            box-shadow: 0 10px 20px rgba(142, 68, 173, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            display: block;
            border: 2px solid transparent;
        }

        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 30px rgba(142, 68, 173, 0.4), var(--glow);
            background: linear-gradient(45deg, var(--primary-purple), var(--primary-pink));
        }

        /* Cursor Effect - Mouse Follow Light */
        #mouse-light {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 126, 179, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
        }

        /* Particles */
        #particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            .subtitle { font-size: 1.2rem; }
            .btn { font-size: 1rem; padding: 0.8rem 1.5rem; }
            #mouse-light { display: none; }
        }
    </style>
</head>
<body>

    <div id="mouse-light"></div>
    <div id="particles-container"></div>

    <div class="container">
        <div class="profile-container">
            <img src="assets/image.png" alt="Profil Fotoğrafı" class="profile-pic">
        </div>

        <h1>Not Uygulamam</h1>
        <p class="subtitle">Hoş Geldiniz!</p>

        <nav class="button-group">
            <a href="app.html" class="btn">🚀 Uygulamam</a>
            <a href="hafta3/grafikler.png" class="btn">📊 Grafik</a>
            <a href="hafta3/data.csv" class="btn">📂 Data</a>
        </nav>
    </div>

    <script>
        // Mouse Following Light
        const mouseLight = document.getElementById('mouse-light');
        document.addEventListener('mousemove', (e) => {
            mouseLight.style.left = e.clientX + 'px';
            mouseLight.style.top = e.clientY + 'px';
        });

        // Floating Particles
        const particlesContainer = document.getElementById('particles-container');
        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            const size = Math.random() * 5 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = '110vh';
            
            const duration = Math.random() * 10 + 5;
            particle.style.animationDuration = `${duration}s`;
            
            particlesContainer.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, duration * 1000);
        }

        setInterval(createParticle, 300);

        // Initial particles
        for(let i=0; i<20; i++) {
            createParticle();
        }
    </script>
</body>
</html>
